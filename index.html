<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Clone - Dashboard</title>
    <style>
        :root {
            --primary: #0084ff;
            --bg: #18191a;
            --card: #242526;
            --text: #e4e6eb;
            --text-muted: #b0b3b8;
            --border: #3a3b3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; }
        header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        header h1 { font-size: 1.4rem; color: var(--primary); }
        .badge { background: #2d88ff33; color: var(--primary); padding: 4px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .card h2 { font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        input, select { width: 100%; background: #3a3b3c; border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: #fff; font-size: 0.95rem; }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0073e6; }
        .status-msg { margin-top: 10px; padding: 10px; border-radius: 6px; font-size: 0.9rem; display: none; }
        .success { background: #28a74522; color: #28a745; border: 1px solid #28a74544; }
        .error { background: #dc354522; color: #dc3545; border: 1px solid #dc354544; }
    </style>
</head>
<body>

    <header>
        <h1>Meta Ads Manager</h1>
        <span class="badge">Live Engine</span>
    </header>

    <!-- Create Ad Campaign Card -->
    <div class="card">
        <h2>📢 Create New Campaign</h2>
        <form id="adForm">
            <div class="form-group">
                <label>Ad Campaign Title</label>
                <input type="text" id="title" placeholder="e.g., Earn Free JMPT Tokens" required>
            </div>
            <div class="form-group">
                <label>Target Action Link (WhatsApp / Website)</label>
                <input type="url" id="targetLink" placeholder="https://wa.me/yournumber" required>
            </div>
            <div class="form-group">
                <label>Banner Image URL</label>
                <input type="url" id="imageUrl" placeholder="https://example.com/banner.png" required>
            </div>
            <div class="form-group">
                <label>Target Country Geo-Filter</label>
                <select id="targetCountry">
                    <option value="NG">Nigeria (NG)</option>
                    <option value="GH">Ghana (GH)</option>
                    <option value="US">United States (US)</option>
                    <option value="ALL">Global (All Countries)</option>
                </select>
            </div>
            <button type="submit" id="submitBtn">Launch Ad Campaign</button>
        </form>
        <div id="status" class="status-msg"></div>
    </div>

    <script>
        // Connected to your live backend URL string directly
        const BACKEND_URL = 'https://meta-ads-clone-backends.onrender.com';

        document.getElementById('adForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            submitBtn.innerText = 'Uploading to Cluster...';
            submitBtn.disabled = true;
            statusDiv.style.display = 'none';

            const adData = {
                title: document.getElementById('title').value,
                targetLink: document.getElementById('targetLink').value,
                imageUrl: document.getElementById('imageUrl').value,
                targetCountry: document.getElementById('targetCountry').value,
                status: 'active'
            };

            try {
                // Sending form inputs straight to your live Render API engine routes
                const response = await fetch(`${BACKEND_URL}/api/ads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'status-msg success';
                    statusDiv.innerText = '🚀 Campaign launched successfully and synchronized to your MongoDB Cloud cluster!';
                    document.getElementById('adForm').reset();
                } else {
                    throw new Error(result.message || 'Server rejected creation configuration.');
                }
            } catch (err) {
                statusDiv.className = 'status-msg error';
                statusDiv.innerText = `❌ Error launching campaign: ${err.message}`;
            } finally {
                submitBtn.innerText = 'Launch Ad Campaign';
                submitBtn.disabled = false;
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
