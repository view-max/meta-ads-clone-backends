<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Manager</title>
    <style>
        :root {
            --meta-blue: #1877f2;
            --meta-bg: #f0f2f5;
            --meta-card: #ffffff;
            --meta-text: #1c1e21;
            --meta-muted: #65676b;
            --meta-border: #e4e6eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--meta-bg); color: var(--meta-text); }
        
        /* Premium Meta Header bar */
        .meta-navbar { background: #fff; border-bottom: 1px solid var(--meta-border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .meta-logo { display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--meta-blue); font-size: 1.3rem; }
        .meta-logo svg { width: 24px; height: 24px; }
        .user-pill { background: #f0f2f5; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--meta-muted); }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }

        /* Meta Analytics Overview Grid */
        .analytics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--meta-card); border: 1px solid var(--meta-border); border-radius: 8px; padding: 15px; text-align: left; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stat-card p { font-size: 0.8rem; color: var(--meta-muted); font-weight: 600; text-transform: uppercase; }
        .stat-card h3 { font-size: 1.4rem; margin-top: 5px; color: #000; }

        /* Professional Work Cards */
        .meta-card { background: var(--meta-card); border: 1px solid var(--meta-border); border-radius: 8px; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .meta-card h2 { font-size: 1.1rem; border-bottom: 1px solid var(--meta-border); padding-bottom: 12px; margin-bottom: 15px; color: var(--meta-text); }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--meta-text); margin-bottom: 6px; }
        input, select { width: 100%; border: 1px solid #ccd0d5; padding: 12px; border-radius: 6px; font-size: 0.95rem; background: #f5f6f7; color: var(--meta-text); transition: border 0.2s; }
        input:focus, select:focus { border-color: var(--meta-blue); background: #fff; outline: none; }
        
        /* Custom Gallery Button Style */
        .file-label { display: block; text-align: center; background: #e4e6eb; color: #000; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.95rem; border: 1px dashed #ced0d4; transition: background 0.2s; }
        .file-label:hover { background: #d8dadf; }
        input[type="file"] { display: none; }
        
        /* Image Live Preview Screen Container */
        .preview-box { display: none; margin-top: 10px; width: 100%; max-height: 200px; object-fit: cover; border-radius: 6px; border: 1px solid var(--meta-border); }

        .meta-btn { width: 100%; background: var(--meta-blue); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .meta-btn:hover { background: #166fe5; }
        
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 6px; font-size: 0.9rem; display: none; font-weight: 500; }
        .success { background: #e7f3ff; color: var(--meta-blue); border: 1px solid #ccd0d5; }
        .error { background: #ffebe9; color: #ce1126; border: 1px solid #ffccd0; }
    </style>
</head>
<body>

    <!-- Meta Native Header Bar Navigation -->
    <div class="meta-navbar">
        <div class="meta-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            <span>Ads Manager</span>
        </div>
        <div class="user-pill">Yolo Workspace Active</div>
    </div>

    <div class="container">
        
        <!-- Live Performance Metrics Tracker Row -->
        <div class="analytics-grid">
            <div class="stat-card">
                <p>Total Reach</p>
                <h3>0</h3>
            </div>
            <div class="stat-card">
                <p>Link Clicks</p>
                <h3>0</h3>
            </div>
            <div class="stat-card">
                <p>Amount Spent</p>
                <h3>₦0.00</h3>
            </div>
        </div>

        <!-- Create Ad Setup Layout Section -->
        <div class="meta-card">
            <h2>📢 Create Automated Ad Campaign</h2>
            <form id="adForm">
                <div class="form-group">
                    <label>Ad Creative Copy Text / Title</label>
                    <input type="text" id="title" placeholder="What services are you promoting?" required>
                </div>
                <div class="form-group">
                    <label>Call to Action Link (WhatsApp Destination)</label>
                    <input type="url" id="targetLink" placeholder="https://wa.me/234..." required>
                </div>
                
                <!-- NEW Gallery Image Upload Picker -->
                <div class="form-group">
                    <label>Marketing Banner Image</label>
                    <label for="imageFile" class="file-label" id="fileLabelText">🖼️ Choose Photo from Gallery</label>
                    <input type="file" id="imageFile" accept="image/*" required>
                    <img id="imagePreview" class="preview-box" alt="Preview window">
                </div>

                <div class="form-group">
                    <label>Target Audience Location</label>
                    <select id="targetCountry">
                        <option value="NG">Nigeria (NG)</option>
                        <option value="GH">Ghana (GH)</option>
                        <option value="ALL">Global Audience</option>
                    </select>
                </div>
                <button type="submit" class="meta-btn" id="submitBtn">Publish Campaign</button>
            </form>
            <div id="status" class="status-msg"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://meta-ads-clone-backends.onrender.com';
        let base64ImageString = "";

        // Handles gallery file picker processing selection logic
        document.getElementById('imageFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // Limit file size size to under 2MB to keep MongoDB cloud usage fast and stable
                if (file.size > 2 * 1024 * 1024) {
                    alert("⚠️ Photo size is too large! Please pick an image smaller than 2MB.");
                    this.value = "";
                    return;
                }

                document.getElementById('fileLabelText').innerText = `✅ Chosen: ${file.name}`;
                
                const reader = new FileReader();
                reader.onloadend = function() {
                    base64ImageString = reader.result;
                    const preview = document.getElementById('imagePreview');
                    preview.src = base64ImageString;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('adForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const statusDiv = document.getElementById('status');
            
            if(!base64ImageString) {
                alert("Please wait for your gallery photo to process completely.");
                return;
            }

            submitBtn.innerText = 'Publishing to Meta Network...';
            submitBtn.disabled = true;
            statusDiv.style.display = 'none';

            const adData = {
                title: document.getElementById('title').value,
                targetLink: document.getElementById('targetLink').value,
                imageUrl: base64ImageString, // Sends image data safely encoded as a clean data string
                targetCountry: document.getElementById('targetCountry').value
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/ads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(adData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'status-msg success';
                    statusDiv.innerText = '💪 Campaign published live! Data synced cleanly into MongoDB Cloud Cluster.';
                    document.getElementById('adForm').reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    document.getElementById('fileLabelText').innerText = '🖼️ Choose Photo from Gallery';
                    base64ImageString = "";
                } else {
                    throw new Error(result.message || 'Server rejected creation database sync.');
                }
            } catch (err) {
                statusDiv.className = 'status-msg error';
                statusDiv.innerText = `❌ Error Publishing: ${err.message}`;
            } finally {
                submitBtn.innerText = 'Publish Campaign';
                submitBtn.disabled = false;
                statusDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
